<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earnings Categorizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; background: #f5f5f7; min-height: 100vh; }

#upload-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.upload-box { background: #fff; border-radius: 16px; border: 2px dashed #d1d1d6; padding: 3rem 2rem; text-align: center; max-width: 480px; width: 100%; }
.upload-box h1 { font-size: 22px; font-weight: 600; color: #1c1c1e; margin-bottom: 0.5rem; }
.upload-box p { color: #6e6e73; font-size: 15px; margin-bottom: 1.5rem; line-height: 1.5; }
.upload-btn { display: inline-block; background: #007aff; color: #fff; border: none; border-radius: 10px; padding: 0.75rem 2rem; font-size: 16px; font-weight: 500; cursor: pointer; }
.upload-btn:hover { background: #0066d6; }
#file-input { display: none; }

#app-screen { display: none; max-width: 620px; margin: 0 auto; padding: 0.75rem 1rem 2rem; }

.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0 0.25rem; }
.top-bar h2 { font-size: 17px; font-weight: 600; color: #1c1c1e; }
.save-btn { background: none; border: 1.5px solid #34c759; color: #34c759; border-radius: 8px; padding: 5px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.save-btn:hover { background: #34c759; color: #fff; }

.progress-bar-wrap { background: #e5e5ea; border-radius: 99px; height: 6px; margin: 0.75rem 0 0.3rem; }
.progress-bar-fill { background: #007aff; height: 6px; border-radius: 99px; transition: width 0.3s; }
.progress-text { font-size: 13px; color: #6e6e73; margin-bottom: 0.9rem; }

.card { background: #fff; border-radius: 16px; padding: 1.1rem 1.25rem 1rem; margin-bottom: 0.9rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.75rem; align-items: center; }
.badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 99px; }
.badge-date { background: #e5e5ea; color: #3a3a3c; }
.badge-platform { background: #e8f4ff; color: #0055b3; }
.entry-counter { font-size: 13px; color: #6e6e73; margin-left: auto; }
.amount { font-size: 30px; font-weight: 700; color: #1c1c1e; margin-bottom: 0.6rem; }
.field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #ababab; margin-bottom: 3px; margin-top: 10px; }
.field-value { font-size: 15px; color: #1c1c1e; word-break: break-word; line-height: 1.4; }
.field-value.italic { color: #6e6e73; font-style: italic; }

.categories { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; margin-bottom: 0.75rem; }
.cat-btn { background: #f2f2f7; border: 1.5px solid transparent; border-radius: 10px; padding: 0.6rem 0.5rem; font-size: 14px; font-weight: 500; color: #1c1c1e; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3; }
.cat-btn:hover { background: #e8f0fe; border-color: #007aff; color: #007aff; }
.cat-btn.selected { background: #007aff; color: #fff; border-color: #007aff; }
.cat-btn.not-business { background: #fff0f0; color: #cc0000; border-color: #ffcccc; }
.cat-btn.not-business:hover, .cat-btn.not-business.selected { background: #cc0000; color: #fff; border-color: #cc0000; }
.cat-btn.new-cat { background: #f5f0ff; color: #7c3aed; border-color: #e0d4ff; }
.cat-btn.new-cat:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }

.nav-row { display: flex; gap: 0.5rem; }
.nav-btn { flex: 1; padding: 0.65rem; border-radius: 10px; border: 1.5px solid #d1d1d6; background: #fff; font-size: 15px; font-weight: 500; cursor: pointer; color: #1c1c1e; }
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.nav-btn.primary { background: #007aff; color: #fff; border-color: #007aff; }
.nav-btn.primary:hover:not(:disabled) { background: #0066d6; }
.nav-btn:hover:not(:disabled):not(.primary) { background: #f2f2f7; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.5rem; max-width: 380px; width: 100%; }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 0.4rem; color: #1c1c1e; }
.modal p { font-size: 14px; color: #6e6e73; margin-bottom: 1rem; line-height: 1.5; }
.modal input { width: 100%; border: 1.5px solid #d1d1d6; border-radius: 10px; padding: 0.65rem 0.85rem; font-size: 15px; outline: none; margin-bottom: 1rem; color: #1c1c1e; }
.modal input:focus { border-color: #7c3aed; }
.modal-btns { display: flex; gap: 0.5rem; }
.modal-btns button { flex: 1; padding: 0.65rem; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: 1.5px solid #d1d1d6; background: #fff; color: #1c1c1e; }
.modal-btns button.confirm { background: #7c3aed; color: #fff; border-color: #7c3aed; }
.modal-btns button.confirm:hover { background: #6d28d9; }
.modal-btns button:hover:not(.confirm) { background: #f2f2f7; }

#done-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
#done-screen h2 { font-size: 26px; font-weight: 700; margin-bottom: 0.5rem; color: #1c1c1e; }
#done-screen p { color: #6e6e73; margin-bottom: 1.5rem; font-size: 15px; max-width: 360px; line-height: 1.5; }
.dl-btn { background: #34c759; color: #fff; border: none; border-radius: 12px; padding: 0.85rem 2.5rem; font-size: 17px; font-weight: 600; cursor: pointer; margin-bottom: 1rem; }
.dl-btn:hover { background: #28a745; }
.restart-btn { background: none; border: none; color: #007aff; font-size: 15px; cursor: pointer; padding: 0.5rem; }
.restart-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="upload-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;">
  <div style="background:#fff;border-radius:16px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
    <h1 style="font-size:22px;font-weight:600;color:#1c1c1e;margin-bottom:0.5rem;">Earnings Categorizer</h1>
    <p style="color:#6e6e73;font-size:15px;margin-bottom:2rem;line-height:1.5;">Start fresh or resume from a previously saved progress file.</p>
    <button onclick="startFresh()" style="display:block;width:100%;background:#007aff;color:#fff;border:none;border-radius:10px;padding:0.8rem;font-size:16px;font-weight:500;cursor:pointer;margin-bottom:0.75rem;">Start Fresh</button>
    <label style="display:block;width:100%;background:#fff;color:#555;border:1.5px solid #d1d1d6;border-radius:10px;padding:0.75rem;font-size:15px;font-weight:500;cursor:pointer;box-sizing:border-box;" for="resume-input">Resume from Saved File</label>
    <input type="file" id="resume-input" accept=".xlsx,.xls" style="display:none;">
    <p style="margin-top:0.75rem;font-size:13px;color:#aaa;" id="resume-file-name"></p>
  </div>
</div>

<div id="app-screen">
  <div class="top-bar">
    <h2>Categorize Earnings</h2>
    <button class="save-btn" onclick="saveAndDownload()">💾 Save &amp; Download</button>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <p class="progress-text" id="progress-text"></p>

  <div class="card">
    <div class="card-meta">
      <span class="badge badge-date" id="entry-date"></span>
      <span class="badge badge-platform" id="entry-platform"></span>
      <span class="entry-counter" id="counter"></span>
    </div>
    <div class="amount" id="entry-amount"></div>
    <div class="field-label">Client Name</div>
    <div class="field-value" id="entry-client"></div>
    <div class="field-label">Description</div>
    <div class="field-value italic" id="entry-stmt"></div>
  </div>

  <div class="categories" id="cat-grid"></div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-back" onclick="goBack()">← Back</button>
    <button class="nav-btn primary" id="btn-next" onclick="goNext()" disabled>Next →</button>
  </div>
</div>

<div id="done-screen">
  <h2>All done! 🎉</h2>
  <p id="done-summary"></p>
  <button class="dl-btn" onclick="downloadFile()">Download Final File</button>
  
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>New Category</h3>
    <p>Type a name for the new category. It will appear as an option for all remaining entries too.</p>
    <input type="text" id="new-cat-input" placeholder="e.g. Botox, Dermaplaning..." maxlength="60" />
    <div class="modal-btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="confirm" onclick="confirmNewCat()">Add Category</button>
    </div>
  </div>
</div>

const BASE_CATEGORIES = [
  'Facial','Brows','Lashes','Waxing','Product','Makeup',
  'Hair','Deposit','Hair & Makeup','Brows & Lashes','Affiliate sale','Class'
];
const SPECIAL_NEW = '+ Enter new category';
const SPECIAL_NOT = 'Not business related';

let categories = [...BASE_CATEGORIES];
let workbook = null;
let allRows = [];
let earningIndices = [];
let answers = {};
let current = 0;

function b64ToUint8Array(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function startFresh() {
  const data = b64ToUint8Array(PRELOADED_XLSX_B64);
  workbook = XLSX.read(data, { type: 'array', cellDates: true });
  loadEarnings();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('resume-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('resume-file-name').textContent = file.name;
    const reader = new FileReader();
    reader.onload = function(evt) {
      workbook = XLSX.read(evt.target.result, { type: 'array', cellDates: true });
      loadEarnings();
    };
    reader.readAsArrayBuffer(file);
  });
});

function loadEarnings() {
  const ws = workbook.Sheets[workbook.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'MM/DD/YYYY' });
  allRows = data;
  earningIndices = [];

  for (let i = 1; i < data.length; i++) {
    const row = data[i];
    if ((row[1] || '').toString().trim() === 'Earning') {
      earningIndices.push(i);
      const existing = (row[4] || '').toString().trim();
      if (existing) {
        answers[i] = existing;
        if (existing !== SPECIAL_NOT && !categories.includes(existing) && !BASE_CATEGORIES.includes(existing)) {
          categories.push(existing);
        }
      }
    }
  }

  // Resume from first unanswered
  current = 0;
  for (let i = 0; i < earningIndices.length; i++) {
    if (!(earningIndices[i] in answers)) { current = i; break; }
    if (i === earningIndices.length - 1) current = i;
  }

  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  buildCatGrid();
  showEntry();
}

function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  const currentAns = answers[earningIndices[current]] || null;
  grid.innerHTML = '';
  const allCats = [...categories, SPECIAL_NEW, SPECIAL_NOT];
  allCats.forEach(cat => {
    const btn = document.createElement('button');
    if (cat === SPECIAL_NOT) btn.className = 'cat-btn not-business';
    else if (cat === SPECIAL_NEW) btn.className = 'cat-btn new-cat';
    else btn.className = 'cat-btn';
    if (cat === currentAns) btn.classList.add('selected');
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.onclick = () => handleCatClick(cat);
    grid.appendChild(btn);
  });
}

function handleCatClick(cat) {
  if (cat === SPECIAL_NEW) { openModal(); return; }
  selectCat(cat);
}

function selectCat(cat) {
  const idx = earningIndices[current];
  answers[idx] = cat;
  document.querySelectorAll('#cat-grid .cat-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.cat === cat);
  });
  document.getElementById('btn-next').disabled = false;
}

function openModal() {
  document.getElementById('new-cat-input').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-cat-input').focus(), 80);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('new-cat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmNewCat();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function confirmNewCat() {
  const val = document.getElementById('new-cat-input').value.trim();
  if (!val) return;
  if (!categories.includes(val)) categories.push(val);
  closeModal();
  buildCatGrid();
  selectCat(val);
}

function showEntry() {
  const total = earningIndices.length;
  const idx = earningIndices[current];
  const row = allRows[idx];

  document.getElementById('entry-date').textContent = row[0] || '';
  document.getElementById('entry-platform').textContent = row[5] || '';
  document.getElementById('entry-amount').textContent = formatAmount(row[2]);
  document.getElementById('entry-client').textContent = row[3] || '(no client name)';
  document.getElementById('entry-stmt').textContent = row[6] || '(no description)';
  document.getElementById('counter').textContent = (current + 1) + ' / ' + total;

  const answered = Object.keys(answers).length;
  const pct = Math.round(answered / total * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  const remaining = total - answered;
  document.getElementById('progress-text').textContent = pct + '% complete' + (remaining > 0 ? ' — ' + remaining + ' remaining' : ' — all categorized!');

  document.getElementById('btn-back').disabled = current === 0;
  document.getElementById('btn-next').disabled = !(idx in answers);

  buildCatGrid();
}

function formatAmount(val) {
  if (!val) return '$0.00';
  const n = parseFloat(String(val).replace(/[^0-9.\-]/g, ''));
  if (isNaN(n)) return String(val);
  return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function goNext() {
  if (current < earningIndices.length - 1) {
    current++;
    showEntry();
  } else {
    applyAndFinish();
  }
}

function goBack() {
  if (current > 0) { current--; showEntry(); }
}

function buildOutputData(forFinal) {
  const ws = workbook.Sheets[workbook.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true });
  const toDelete = [];

  Object.entries(answers).forEach(([rowIdx, cat]) => {
    const r = parseInt(rowIdx);
    if (cat === SPECIAL_NOT) {
      if (forFinal) {
        toDelete.push(r);
      } else {
        // In progress: write the flag text so it can be detected on re-upload
        if (data[r]) {
          while (data[r].length < 5) data[r].push('');
          data[r][4] = SPECIAL_NOT;
        }
      }
    } else {
      if (data[r]) {
        while (data[r].length < 5) data[r].push('');
        data[r][4] = cat;
      }
    }
  });

  let finalData = data;
  if (forFinal && toDelete.length > 0) {
    toDelete.sort((a, b) => b - a);
    toDelete.forEach(r => finalData.splice(r, 1));
  }
  return finalData;
}

function saveAndDownload() {
  const data = buildOutputData(false);
  const newWs = XLSX.utils.aoa_to_sheet(data);
  const newWb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(newWb, newWs, workbook.SheetNames[0]);
  XLSX.writeFile(newWb, 'transactions_in_progress.xlsx');
}

function applyAndFinish() {
  const total = earningIndices.length;
  const deleted = Object.values(answers).filter(v => v === SPECIAL_NOT).length;
  const categorized = Object.keys(answers).length - deleted;
  const skipped = total - Object.keys(answers).length;
  let summary = categorized + ' entries categorized';
  if (deleted > 0) summary += ', ' + deleted + ' removed (not business related)';
  if (skipped > 0) summary += ', ' + skipped + ' left without a category';
  summary += '.';
  document.getElementById('done-summary').textContent = summary;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('done-screen').style.display = 'flex';
}

function downloadFile() {
  const data = buildOutputData(true);
  const newWs = XLSX.utils.aoa_to_sheet(data);
  const newWb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(newWb, newWs, workbook.SheetNames[0]);
  XLSX.writeFile(newWb, 'transactions_categorized.xlsx');
}
</script>
